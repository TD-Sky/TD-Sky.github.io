<h1>Rust如何交叉编译到Windows</h1>

    </header>
    
    <main>
        
<article>
    
    <em>写于 <time>2022-01-11</time></em>
    
    
    
    <p>首先，下载Windows的工具链支持：</p>
<pre data-lang="bash" style="background-color:#fafafa;color:#383a42;" class="language-bash "><code class="language-bash" data-lang="bash"><span style="color:#e45649;">$</span><span> sudo pacman</span><span style="color:#e45649;"> -S</span><span> mingw-w64
</span></code></pre>
<p>使用<code>rustup</code>添加Windows64位的工具链：</p>
<pre data-lang="bash" style="background-color:#fafafa;color:#383a42;" class="language-bash "><code class="language-bash" data-lang="bash"><span style="color:#e45649;">$</span><span> rustup target add x86_64-pc-windows-gnu
</span></code></pre>
<p>编译到Windows平台：</p>
<pre data-lang="bash" style="background-color:#fafafa;color:#383a42;" class="language-bash "><code class="language-bash" data-lang="bash"><span style="color:#e45649;">$</span><span> cargo build</span><span style="color:#e45649;"> --target</span><span style="color:#a626a4;">=</span><span>x86_64-pc-windows-gnu
</span></code></pre>

</article>
