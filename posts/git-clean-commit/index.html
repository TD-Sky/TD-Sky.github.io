<h1>清理git项目的commit</h1>

    </header>
    
    <main>
        
<article>
    
    <em>写于 <time>2022-03-13</time></em>
    
    
    
    <p>有时你用git只是为了版本化备份文件。随着提交次数增多，文件库逐渐积累起大量无用的备份信息。因此你必须定期清理commit。</p>
<pre data-lang="bash" style="background-color:#fafafa;color:#383a42;" class="language-bash "><code class="language-bash" data-lang="bash"><span style="color:#e45649;">$</span><span> git checkout</span><span style="color:#e45649;"> --orphan</span><span style="color:#a626a4;">=</span><span>new
</span><span style="color:#e45649;">$</span><span> git add .
</span><span style="color:#e45649;">$</span><span> git commit</span><span style="color:#e45649;"> -m </span><span style="color:#50a14f;">&quot;New tree&quot;
</span><span style="color:#e45649;">$</span><span> git branch</span><span style="color:#e45649;"> -D</span><span> main
</span><span style="color:#e45649;">$</span><span> git branch</span><span style="color:#e45649;"> -m</span><span> main
</span><span style="color:#e45649;">$</span><span> git push</span><span style="color:#e45649;"> -f</span><span> origin main
</span></code></pre>

</article>
